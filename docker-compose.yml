version: "3.9"

services:
  api:
    build: .
    container_name: aiot-api
    environment:
      DATABASE_URL: postgresql://aiot_user:aiot_password@postgres:5432/aiot_db
      MIGRATION_DATABASE_URL: postgresql://aiot_user:aiot_password@postgres:5432/aiot_db
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DEBUG: "false"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_MEDIA_BUCKET: ${SUPABASE_MEDIA_BUCKET:-media-demo}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aiot-postgres
    environment:
      POSTGRES_DB: aiot_db
      POSTGRES_USER: aiot_user
      POSTGRES_PASSWORD: aiot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiot_user -d aiot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin 4 (web GUI) ───────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: aiot-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@aiot.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
